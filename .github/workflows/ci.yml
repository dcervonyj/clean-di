name: CI

on:
  push:
    branches: [master]
  pull_request: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter './packages/*' build

      - run: pnpm typecheck

      - run: pnpm lint

      - run: pnpm test

      - run: pnpm build

      - name: Check generated files are up to date
        run: pnpm --filter './examples/*' check:codegen

      - name: Build examples
        run: pnpm --filter './examples/*' build

      - name: Coverage report
        if: matrix.node-version == 20
        run: pnpm --filter clean-di test:coverage && pnpm --filter clean-di-codegen test:coverage

      - name: Upload coverage
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: |
            packages/clean-di/coverage/lcov.info
            packages/clean-di-codegen/coverage/lcov.info
          retention-days: 14

  changeset-status:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Check changeset present
        continue-on-error: true
        run: pnpm changeset status --since origin/master

  smoke-test:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: bash scripts/smoke-test.sh
